  - title: "Parliamentary Elites in Authoritarian Regimes (PEAR): New Data"
    coauthors: ""
    status: "Under Review"
    url: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5563678"
    tags: [Authoritarianism, legislatures, members of parliament, political elites, data]
    abstract: "Authoritarian politics are largely defined and shaped by elite politics. Yet, our knowledge about political elites in nondemocracies remains confined to those in particular regimes or, cross-nationally, leaders at the highest echelons of decision-making. This article introduces a novel dataset, Parliamentary Elites in Authoritarian Regimes (PEAR), that fills this gap. With currently more than 221,000 observations on individual MPs from 819 legislative terms in 130 authoritarian regimes from 1945 to 2024, PEAR is based on the largest individual-level demographic database on national legislators ever assembled and provides unprecedented information about elites in authoritarian regimes. I first present how the dataset was created and validate it by matching the data against existing data. I then replicate existing analyses on the determinants of legislative turnover originating from democracies and illustrate further potential applications of the new data. PEAR will be an invaluable resource for our understanding of authoritarian regimes."

