# Published Articles
published:
  - title: "From Aid to Empowerment: The Impact of Democracy Assistance on Civil Society"
    coauthors: "Marike Blanken and <a href='https://adeagafuri.wordpress.com/' target='_blank'>Adea Gafuri</a>"
    year: 2025
    journal: "Journal of Development Studies"
    url: "https://www.tandfonline.com/doi/full/10.1080/00220388.2025.2487005"
    tags: [Democracy aid, civil society, democracy assistance, democratisation, authoritarian regimes]
    abstract: "A growing body of research indicates that democracy aid improves levels of democracy in recipient countries. However, the precise mechanisms behind this relationship are understudied. Contributing to the debates on democracy promotion, we argue that earmarked funding channelled through civil society strengthens civil society organisations' capacity building, curbs corruption, and reduces information gaps. Consequently, aid empowers civil society and ultimately enhances democracy in recipient countries. Using aid data from OECD-DAC and Varieties of Democracy, we analyse earmarked funding for civil society organisations across 128 recipient countries between 2005 and 2021 and find evidence for the positive but modest impact of this type of aid. The results demonstrate that democracy aid channelled through CSOs is positively associated with both, the strength of civil society and democracy levels in the recipient country, although the associations are relatively weak. We also find these associations to be slightly stronger in closed authoritarian regimes. This work contributes both theoretically and empirically to the debates about the effectiveness of democracy aid and the role of civil society in democratisation processes."

  - title: "Party Systems, Democratic Positions, and Regime Changes: Introducing the Party-System Democracy Index"
    coauthors: "<a href='https://www.fangiolillo.com/' target='_blank'>Fabio Angiolillo</a> and Staffan I. Lindberg"
    year: 2025
    journal: "British Journal of Political Science"
    url: "https://www.cambridge.org/core/journals/british-journal-of-political-science/article/party-systems-democratic-positions-and-regime-changes-introducing-the-partysystem-democracy-index/1259751C10EBA5A423D0EFC2D41AAF9F"
    tags: [Democracy, autocracy, political parties, party system, regime change]
    abstract: "One of the most important global political developments is the current wave of autocratization. Most research identifies this as an executive-led process, while others highlight the role opposition actors play in resisting it. We combine this work into a common framework asking, how (anti-)democratic are party systems? Party-system literature emphasises and measures policy differences, while we conceptualise party systems' democratic positions highlighting to what extent divergent regime preferences are prevalent across parties. To estimate this dimension, we introduce the Party-System Democracy Index (PSDI), capable of tracking regime preferences across party systems from 1970 to 2019 across 178 countries and 3,151 country-years. We implement well-established content, convergent, and construct validity tests to confirm the PSDI's reliability. Finally, we also show that the PSDI is an important predictor for regime changes in either direction and that changes in the PSDI can signal a looming regime change. This work provides a new framework for studying regime changes and contributes to the renewal of the party-systems literature."

  - title: "When Autocratization is Reversed: Episodes of Democratic Turnarounds since 1900"
    coauthors: "Marina Nord, <a href='https://www.fangiolillo.com/' target='_blank'>Fabio Angiolillo</a>, Martin Lundstedt, and Staffan I. Lindberg"
    year: 2025
    journal: "Democratization"
    url: "https://www.tandfonline.com/doi/full/10.1080/13510347.2024.2448742"
    tags: [Democracy, autocratization, democratic resistance, turnaround, U-Turn]
    abstract: "The world is in a \"wave of autocratization.\" Yet, recent events in Brazil, the Maldives, and Zambia demonstrate that autocratization can be halted and reversed. This article introduces \"U-Turn\" as a new type of regime transformation episode in which autocratization is closely followed by and linked to subsequent democratization. Drawing on earlier literature, it provides a general conceptualization and operationalization of this type of episode, complementing the existing Episodes of Regime Transformation (ERT) framework. The accompanying database provides descriptions for all 102 U-Turn episodes from 1900 to 2023, differentiating between three types: authoritarian manipulation, democratic reaction, and international intervention. The analysis presents a systematic empirical overview of patterns and developments of U-Turns. A key finding is that 52% of all autocratization episodes become U-Turns, which increases to 73% when focusing on the last 30 years. The vast majority of U-Turns (90%) lead to restored or even improved levels of democracy. The data on U-Turn episodes opens up new avenues for research on autocratization and democratization that were previously treated as isolated processes, particularly it could help us understand why some processes of autocratization trigger a successful pro-democratic backlash - a critical question during the starkest-ever wave of autocratization."

  - title: "Expertise and Responsiveness in People's Political Consultative Conferences"
    coauthors: ""
    year: 2024
    journal: "The China Quarterly"
    url: "https://www.cambridge.org/core/journals/china-quarterly/article/expertise-and-responsiveness-in-peoples-political-consultative-conferences/D7CA851411DBFD62640ECF2B65631DB6"
    tags: [Responsiveness, authoritarianism, China, consultative conferences, consultation, policymaking]
    abstract: "What benefits do inclusive institutions offer authoritarian rulers? Previous research has studied delegate behaviour in authoritarian institutions but has been less well-equipped to assess government reactions to it. Analysing the case of one People's Political Consultative Conference in China, I argue that an overlooked key benefit of inclusive institutions is their provision of expertise. Drawing on novel data comprising more than 9,000 policy suggestions submitted by delegates, delegates' biographies and the corresponding government responses, I illustrate that the government generally values suggestions that signal expertise. While this is especially true for departments of a more technocratic nature, I also find that members of the institutional leadership are systematically favoured. These findings provide an important addition to our understanding of the role of authoritarian institutions in policymaking processes."

  - title: "Disinformation and Regime Survival"
    coauthors: "<a href='https://yukosato.github.io/' target='_blank'>Yuko Sato</a>"
    year: 2024
    journal: "Political Research Quarterly"
    url: "https://journals.sagepub.com/doi/10.1177/10659129241252811"
    tags: [Disinformation, propaganda, democratization, autocratization, regime survival]
    abstract: "Disinformation has transformed into a global issue and while it is seen as a growing concern to democracy today, autocrats have long used it as a part of their propaganda repertoire. Yet, no study has tested the effect of disinformation on regime stability and breakdown beyond country-specific studies. Drawing on novel measures from the Digital Society Project (DSP) estimating the levels of disinformation disseminated by governments across 148 countries between 2000-2022 and from the Episodes of Regime Transformation (ERT) dataset, we provide the first global comparative study of disinformation and survival of democratic and authoritarian regimes, respectively. The results show that in authoritarian regimes, disinformation helps rulers to stay in power as regimes with higher levels of disinformation are less likely to experience democratization episodes. In democracies, on the other hand, disinformation increases the probability of autocratization onsets. As such, this study is the first to provide comparative evidence on the negative effects of disinformation on democracy as well as on the prospects of democratization."

  - title: "Environmental Antecedents, Innovation Experience, and Officials' Innovation Willingness: Evidence from China"
    coauthors: "Biao Huang and Xiaodie Wu"
    year: 2024
    journal: "Public Management Review"
    url: "https://www.tandfonline.com/doi/full/10.1080/14719037.2024.2349118"
    tags: [Public sector innovation, innovation willingness, local officials, path dependence, innovation drivers]
    abstract: "Prompting officials' innovation willingness is a prerequisite for processes of public sector innovation. This article constructs a framework explaining officials' innovation willingness by linking environmental antecedents and path dependence. The empirical analysis, based on an original survey of 403 officials and interviews with 102 officials in China, shows that their innovation willingness is mostly driven by factors within the bureaucratic system, i.e. top-down and horizontal drivers but less so by bottom-up drivers. Moreover, officials with previous innovation experience tend to have more innovation willingness but are less driven by top-down factors. This study advances the theory of innovation willingness generation."

  - title: "Corruption, Elite Contestation, and Parliaments: Why Do Legislatures Become Stronger in Authoritarian Regimes?"
    coauthors: ""
    year: 2024
    journal: "Political Research Quarterly"
    url: "https://journals.sagepub.com/doi/full/10.1177/10659129231205296"
    tags: [authoritarianism, legislatures, corruption, institutional development, elites]
    abstract: "A growing body of literature studies the personalization of power in authoritarian regimes. Yet, how institutions can become a credible constraint to dictatorial rule is less widely studied. I theorize that corruption is a key factor associated with stronger legislatures in authoritarian regimes. By engaging in corruption, authoritarian elites in ruling coalitions can build up networks of support and influence and ultimately, use their elevated position to impel more legislative powers vis-à-vis the executive. Examining panel data on the strength of legislatures in authoritarian regimes between 1946 and 2010, I show empirically that authoritarian parliaments are stronger when levels of corruption in a given regime are high. The link between corruption and legislative strength is especially strong in the Middle East and Africa, and primarily applies to party-based and military dictatorships. More competitive electoral and legislative processes, however, do not uniformly affect parliaments' strength. These findings contribute to our understanding of institutional changes in autocracies and highlight the centrality of elite contestations in determining institutional trajectories."

  - title: "State of the World 2022: Defiance in the Face of Autocratization"
    coauthors: "<a href='https://yukosato.github.io/' target='_blank'>Yuko Sato</a>, Marina Nord, Martin Lundstedt, <a href='https://www.fangiolillo.com/' target='_blank'>Fabio Angiolillo</a>, and Staffan I. Lindberg"
    year: 2023
    journal: "Democratization"
    url: "https://www.tandfonline.com/doi/full/10.1080/13510347.2023.2199452"
    tags: [Democracy, autocracy, autocratization, democratic resilience, democratic resurgence, U-Turn]
    abstract: "This article presents the state of democracy in the world in 2022 using the most recent Varieties of Democracy dataset (V13). There are four main findings. First, the level of democracy enjoyed by the average global citizen is down to 1986-levels and 72% of the world's population live in autocracies. Second, the third wave of autocratization reaches a new height with 42 countries autocratizing. By contrast, only 14 countries are democratizing. Third, between 1992 and 2022, autocracies increased their share of the global economy and now account for 46% of world GDP when measured by purchasing power parity. Fourth, defying the global wave of autocratization, eight countries not only stopped but also reversed autocratization in the last 10 years, which we define as democratic U-turns. We find five elements that seem important across the identified cases: executive constraints, mass mobilization, alternation in power, unified opposition coalescing with civil society, and international democracy support."

  - title: "Explaining Activity in Authoritarian Assemblies: Evidence from China"
    coauthors: ""
    year: 2022
    journal: "Journal of East Asian Studies"
    url: "https://www.cambridge.org/core/journals/journal-of-east-asian-studies/article/explaining-activity-in-authoritarian-assemblies-evidence-from-china/C60EC7CF148E82786BE2A26F9108348C"
    tags: [Authoritarianism, legislature, China, cooptation, institutions]
    abstract: "Who attempts to influence policymaking through authoritarian assemblies and why are some delegates considerably more active in doing so than others? Drawing on original data from provincial People's Political Consultative Conferences (PPCCs) in China, this study adopts a delegate-centered perspective and develops a theory of delegates' activity in authoritarian assemblies. It argues that delegates' activity can be explained by a combination of both cooptation theory and an understanding of delegates' position within the authoritarian regime and hierarchy. The results highlight that core elites with more direct means of influencing policymaking will forego assemblies. Yet, peripheral elites lack other institutional channels of access to decision-makers and have to voice their demands in authoritarian legislatures. This study highlights the need for disaggregating groups of actors in authoritarian politics and offers an alternative view of cooptation particularly relevant for closed authoritarian regimes."

  - title: "The Dynamic Role of Governments in Adopting Policy Innovations in China"
    coauthors: "Biao Huang"
    year: 2021
    journal: "Policy & Politics"
    url: "https://bristoluniversitypressdigital.com/view/journals/pp/49/4/article-p633.xml"
    tags: [Policy Innovation, higher-level government, vertical government interaction, innovation copyright, expectation, China, policy diffusion, innovation adoption]
    abstract: "A growing number of studies have paid attention to the dynamic nature of vertical government interactions in authoritarian China. Yet, less attention has been paid to the question of why higher-level governments play different roles in diverse cases of innovation adoptions. Building on the extant literature, this study introduces the concept of innovation copyright, that is, the perceived ownership of the innovation, to explain the different roles of higher-level government involvement in innovation adoption. A comparative case study of policy innovations in China highlights that if higher-level governments perceive that they own the innovation copyright, they act as proactive facilitators, and if higher-level governments perceive that the innovation copyright belongs to local governments, they are involved as political backers. The copyright structures the expectations of higher-level and local governments and as a consequence determines their roles in innovation adoptions."

  - title: "Between Elites and Opposition: Legislatures' Strength in Authoritarian Regimes"
    coauthors: ""
    year: 2021
    journal: "Democratization"
    url: "https://www.tandfonline.com/doi/abs/10.1080/13510347.2021.1881487"
    tags: [authoritarianism, legislatures, legislative strength, co-optation, power sharing, institutions]
    abstract: "Virtually all authoritarian regimes have legislatures, and their role in bolstering regimes has been highlighted in recent research. Yet, the strength of authoritarian legislatures has received relatively little attention, although it can differ remarkably across regimes. This study utilizes an index of legislative strength to analyse parliaments in authoritarian regimes from 1946 to 2010. The empirical findings highlight that three factors are particularly important in predicting legislative strength, namely the level of personalism and the existence of an opposition and elections. However, beyond these factors, it appears that stronger legislatures are not generally associated with less authoritarian control over legislative and electoral processes. Yet, the findings also illustrate significant differences between de facto and de jure powers and across time periods. More competitive electoral and legislative procedures are linked to more de facto powers and stronger legislatures particularly after 1990. The findings contribute to our understanding of the institutional landscape in authoritarian regimes and provide a basis for future research on the effects of legislative strength."

  - title: "Cultural Co-Orientation Revisited: The Case of the South China Morning Post"
    coauthors: ""
    year: 2018
    journal: "Global Media and China"
    url: "https://journals.sagepub.com/doi/full/10.1177/2059436418778306"
    pdf: "https://drive.google.com/file/d/1aoL01jInvlr9BZYvYWrCCCrFKLVu8YMV/view"
    tags: [Agenda setting, communication research methods, content analysis, mass media communication, political communication]
    abstract: "The freedom of press is one aspect that leaders from the West often criticise about China. As former British colony, Hong Kong has been able to preserve its special status with constitutional rights and liberties that also include the freedom of press. However, in recent years, sentiments of increased influence from Beijing have led to fears that it would curb the freedoms enjoyed by residents of the Special Administrative Region. However, instead of clear unambiguous interferences, Beijing has opted for an indirect approach that is predominantly characterised by the salience of economic considerations in reporting news binding the media outlets closer to the position of Beijing. This article shows that the South China Morning Post has undergone an editorial shift that moves it closer to the position of the Chinese government."

