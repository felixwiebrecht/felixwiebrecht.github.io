<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H604DMLEHY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-H604DMLEHY');
  </script>
</head>
<body>
  <nav class="site-nav">
    <div class="nav-container">
      <a class="site-title" href="{{ '/' | relative_url }}">Felix Wiebrecht</a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/research/' | relative_url }}" {% if page.url contains 'research' %}class="active"{% endif %}>Research</a></li>
        <li><a href="{{ '/data/' | relative_url }}" {% if page.url contains 'data' %}class="active"{% endif %}>Data</a></li>
        <li><a href="{{ '/teaching/' | relative_url }}" {% if page.url contains 'teaching' %}class="active"{% endif %}>Teaching</a></li>
        <li><a href="{{ '/consulting/' | relative_url }}" {% if page.url contains 'consulting' %}class="active"{% endif %}>Consulting</a></li>
        <li><a href="https://drive.google.com/file/d/1utAiRBhuNGeVACK-OMcAn-UqUFx-7M1Y/view?usp=sharing" target="_blank">CV</a></li>
      </ul>
    </div>
  </nav>

  <main class="page-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>Felix Wiebrecht &mdash; Lecturer in Politics, University of Liverpool &mdash; <a href="mailto:felix.wiebrecht@liverpool.ac.uk">felix.wiebrecht@liverpool.ac.uk</a></p>
  </footer>

  <script src="{{ '/assets/js/abstracts.js' | relative_url }}"></script>
</body>
</html>
